name: Оновлення тривог по громадах
# Запускається 1-го числа щомісяця і вручну (кнопка Run workflow).
on:
  schedule:
    - cron: "0 5 1 * *"   # 1-го числа кожного місяця о 05:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # КРОК 1: зібрати свіжі дані і закомітити їх у репозиторій
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Зібрати та агрегувати
        env:
          ALERTS_TOKEN: ${{ secrets.ALERTS_TOKEN }}
        run: |
          python3 collect_hromady.py
          python3 build_stats.py

      - name: Закомітити оновлені дані
        run: |
          git config user.name "alerts-bot"
          git config user.email "bot@users.noreply.github.com"
          # Додаємо лише ті файли, що існують, щоб git add не падав
          git add data/alerts.db data/stats.json 2>/dev/null || true
          # Якщо змін немає — спокійно виходимо, не зупиняючи workflow
          if git diff --staged --quiet; then
            echo "Немає нових даних для коміту"
          else
            git commit -m "Оновлення даних $(date -u +%F)"
            # Підтягуємо можливі зовнішні зміни, щоб push не конфліктував
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi

  # КРОК 2: опублікувати сайт на GitHub Pages
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v5
