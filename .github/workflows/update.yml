name: Оновлення тривог по громадах
on:
  schedule:
  - cron: "0 5 * * *"   # щодня о 05:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Зібрати та агрегувати
        env:
          ALERTS_TOKEN: ${{ secrets.ALERTS_TOKEN }}
        run: |
          echo "=== Поточна тека ==="
          pwd
          echo "=== Файли поряд ==="
          ls -la
          echo "=== Що Python бачить у конфігу ==="
          python3 -c "from hromady_config import HROMADY; print('громад:', len(HROMADY), 'uid:', [h['uid'] for h in HROMADY[:5]])"
          echo "=== Запуск збору ==="
          python3 collect_hromady.py
          python3 build_stats.py
      - name: Закомітити оновлені дані
        run: |
          git config user.name "alerts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/alerts.db data/stats.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Немає нових даних"
          else
            git commit -m "Оновлення даних $(date -u +%F)"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v5
